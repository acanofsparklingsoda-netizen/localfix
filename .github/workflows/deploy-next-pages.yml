name: Deploy Next site to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: localfix-next/package-lock.json

      - name: Resolve GitHub Pages base path
        id: paths
        shell: bash
        env:
          BASE_PATH_OVERRIDE: ${{ vars.NEXT_PUBLIC_BASE_PATH }}
          USE_ROOT_PATH: ${{ vars.NEXT_PUBLIC_USE_ROOT_PATH }}
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER_NAME="${GITHUB_REPOSITORY%/*}"

          if [[ "$USE_ROOT_PATH" == "true" ]]; then
            echo "base_path=" >> "$GITHUB_OUTPUT"
          elif [[ -n "$BASE_PATH_OVERRIDE" ]]; then
            echo "base_path=$BASE_PATH_OVERRIDE" >> "$GITHUB_OUTPUT"
          elif [[ "$REPO_NAME" == "$OWNER_NAME.github.io" ]]; then
            echo "base_path=" >> "$GITHUB_OUTPUT"
          else
            echo "base_path=/$REPO_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify Supabase deploy variables
        shell: bash
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          test -n "$NEXT_PUBLIC_SUPABASE_URL" || (echo "Missing NEXT_PUBLIC_SUPABASE_URL" && exit 1)
          test -n "$NEXT_PUBLIC_SUPABASE_ANON_KEY" || (echo "Missing NEXT_PUBLIC_SUPABASE_ANON_KEY" && exit 1)

      - name: Install dependencies
        working-directory: localfix-next
        run: npm ci

      - name: Build static export
        working-directory: localfix-next
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.paths.outputs.base_path }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Keep Next static files visible to GitHub Pages
        run: touch localfix-next/out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: localfix-next/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
